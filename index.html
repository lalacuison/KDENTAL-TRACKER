<style>

<body>
<div class="app" id="app"></div>
<div class="mo" id="modal-overlay"><div class="mc" id="modal-content"></div></div>
<button class="fab" id="fab" title="Add Entry">+</button>
<input type="file" id="logo-input" accept="image/*" style="display:none">

<script>
// ═══════════════════════════════════════════════════════════════
// GOOGLE APPS SCRIPT CODE (to be deployed by user)
// This is shown in the setup screen for copy-paste
// ═══════════════════════════════════════════════════════════════
const APPS_SCRIPT_CODE = `function doGet(e) {
  var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("AppData");
  if (!sheet) {
    sheet = SpreadsheetApp.getActiveSpreadsheet().insertSheet("AppData");
    sheet.getRange("A1").setValue("{}");
  }
  var data = sheet.getRange("A1").getValue();
  return ContentService.createTextOutput(data).setMimeType(ContentService.MimeType.JSON);
}

function doPost(e) {
  try {
    var input = JSON.parse(e.postData.contents);
    var sheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("AppData");
    if (!sheet) {
      sheet = SpreadsheetApp.getActiveSpreadsheet().insertSheet("AppData");
    }
    sheet.getRange("A1").setValue(JSON.stringify(input));
    
    // Also log entries to a separate sheet for spreadsheet viewing
    if (input._lastAction) {
      var logSheet = SpreadsheetApp.getActiveSpreadsheet().getSheetByName("Log");
      if (!logSheet) {
        logSheet = SpreadsheetApp.getActiveSpreadsheet().insertSheet("Log");
        logSheet.getRange("A1:F1").setValues([["Timestamp","Type","Category","Description","Amount","Month/Year"]]);
      }
      var a = input._lastAction;
      logSheet.appendRow([new Date(), a.type, a.category, a.description, a.amount, a.period]);
      delete input._lastAction;
      sheet.getRange("A1").setValue(JSON.stringify(input));
    }
    
    return ContentService.createTextOutput(JSON.stringify({status:"ok"})).setMimeType(ContentService.MimeType.JSON);
  } catch(err) {
    return ContentService.createTextOutput(JSON.stringify({status:"error",message:err.toString()})).setMimeType(ContentService.MimeType.JSON);
  }
}`;

// ═══ DATA ═══
const MF=["January","February","March","April","May","June","July","August","September","October","November","December"];
const MS=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
const QS=[["Jan","Feb","Mar"],["Apr","May","Jun"],["Jul","Aug","Sep"],["Oct","Nov","Dec"]];
const DEF_INC=[{id:"doc_kristine",name:"Doc Kristine Income",icon:"👩‍⚕️"},{id:"assoc_income",name:"Associate Income",icon:"👨‍⚕️"},{id:"other_income",name:"Other Income",icon:"💰"}];
const DEF_EXP=[{id:"payroll",name:"Payroll",icon:"👥"},{id:"benefits",name:"Benefits",icon:"🎁"},{id:"meals",name:"Meals",icon:"🍽️"},{id:"rent",name:"Rent / Assoc Dues",icon:"🏢"},{id:"utilities",name:"Utilities",icon:"💡"},{id:"bir_dues",name:"BIR / Gov't Dues",icon:"🏛️"},{id:"new_equip",name:"New Equipment",icon:"🔧"},{id:"lab",name:"Laboratory",icon:"🧪"},{id:"grocery",name:"Grocery",icon:"🛒"},{id:"office_supplies",name:"Office Supplies",icon:"📎"},{id:"dental_supplies",name:"Dental Supplies",icon:"🦷"},{id:"miscellaneous",name:"Miscellaneous",icon:"📦"},{id:"savings",name:"Savings",icon:"🏦"},{id:"kdc_prof_fees",name:"KDC Prof Fees",icon:"💼"},{id:"marketing",name:"Marketing / Social Media",icon:"📣"},{id:"subscriptions",name:"Subscriptions",icon:"🔄"},{id:"tithes",name:"Tithes / CCF",icon:"⛪"},{id:"continuing_ed",name:"Continuing Education",icon:"📚"}];
const DEF_PAL={bg:"#0b1015",surface:"#111920",surface2:"#182028",surface3:"#1f2a34",border:"#253040",text:"#e4e9f0",muted:"#6b7d93",accent:"#26d9a0",accent2:"#4da6ff",danger:"#ff5c5c",warning:"#f0b429"};
const PRESETS=[
  {name:"Midnight Teal",c:{...DEF_PAL}},
  {name:"Warm Ember",c:{bg:"#12100e",surface:"#1c1814",surface2:"#241f1a",surface3:"#2e2720",border:"#3d3328",text:"#f0e6d8",muted:"#9a8872",accent:"#e8a44a",accent2:"#d46b3c",danger:"#c9453a",warning:"#e8c94a"}},
  {name:"Ocean Blue",c:{bg:"#0a0f1a",surface:"#101828",surface2:"#162035",surface3:"#1c2a42",border:"#253a5a",text:"#e0e8f5",muted:"#6a82a6",accent:"#3b9cf5",accent2:"#7c5cf5",danger:"#f56565",warning:"#f5b83b"}},
  {name:"Forest",c:{bg:"#0a100c",surface:"#111c14",surface2:"#18251a",surface3:"#1f2e22",border:"#2a3f2e",text:"#dce8df",muted:"#6e8a73",accent:"#4aba6e",accent2:"#2b9e7e",danger:"#e05c5c",warning:"#d4a843"}},
  {name:"Clean Light",c:{bg:"#f5f6f8",surface:"#ffffff",surface2:"#f0f1f4",surface3:"#e6e8ec",border:"#d4d7de",text:"#1a1e2c",muted:"#6b7285",accent:"#1a8a6e",accent2:"#3366cc",danger:"#d04040",warning:"#c49020"}},
  {name:"Rose Gold",c:{bg:"#110d0f",surface:"#1a1416",surface2:"#231b1e",surface3:"#2e2326",border:"#3f3034",text:"#f0e4e6",muted:"#9a7f84",accent:"#e0707a",accent2:"#c9a050",danger:"#d04a4a",warning:"#d4b050"}}
];
const SK="kdental-pro-v5";
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const fmt=n=>(!n||n===0)?"—":"₱"+Math.abs(n).toLocaleString("en-PH",{maximumFractionDigits:0});
const fmtS=n=>(!n||n===0)?"₱0":(n<0?"-":"+")+fmt(n);
const pct=(a,b)=>b>0?Math.round((a/b)*100):0;
const esc=s=>(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");

function mkDefault(){return{company:{name:"KDental",subtitle:"Dental Clinic",logoDataUrl:null,chairs:3,workingDaysPerMonth:22,fixedCosts:0},palette:JSON.parse(JSON.stringify(DEF_PAL)),incomeCats:DEF_INC.map(c=>({...c})),expenseCats:DEF_EXP.map(c=>({...c})),recurring:[],goals:{monthlyIncome:0,monthlyExpenseLimit:0,savingsTarget:0,emergencyFundPct:8},budgetPct:{},cashFlow:{startingCash:0,banks:[]},years:{}}}
function ensureYr(d,yr){if(!d.years[yr]){d.years[yr]={income:{},expenses:{},entries:{},budget:{incomePlan:{},expensePlan:{}}};MS.forEach(m=>{d.years[yr].income[m]={};d.years[yr].expenses[m]={};d.years[yr].entries[m]=[];d.years[yr].budget.incomePlan[m]={};d.years[yr].budget.expensePlan[m]={}})}if(!d.years[yr].budget){d.years[yr].budget={incomePlan:{},expensePlan:{}};MS.forEach(m=>{d.years[yr].budget.incomePlan[m]={};d.years[yr].budget.expensePlan[m]={}})}if(!d.budgetPct)d.budgetPct={}}
// ═══ CLOUD SYNC ═══
let SCRIPT_URL = localStorage.getItem("kdental_script_url") || "";
let syncStatus = SCRIPT_URL ? "ready" : "none"; // none, syncing, ok, error
let lastSync = null;

async function cloudLoad() {
  if (!SCRIPT_URL) return null;
  syncStatus = "syncing"; renderSyncBadge();
  try {
    const r = await fetch(SCRIPT_URL);
    if (!r.ok) throw new Error("HTTP " + r.status);
    const data = await r.json();
    if (data && Object.keys(data).length > 0 && data.company) {
      syncStatus = "ok"; lastSync = new Date();
      return data;
    }
    syncStatus = "ok"; lastSync = new Date();
    return null;
  } catch (e) {
    console.error("Cloud load error:", e);
    syncStatus = "error";
    return null;
  }
}

let _syncTimer = null;
let _pendingSync = false;

async function _doCloudSave(data, lastAction) {
  if (!SCRIPT_URL) return;
  syncStatus = "syncing"; renderSyncBadge();
  try {
    const payload = JSON.parse(JSON.stringify(data));
    if (lastAction) payload._lastAction = lastAction;
    const body = JSON.stringify(payload);
    
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open("POST", SCRIPT_URL, true);
      xhr.setRequestHeader("Content-Type", "text/plain;charset=utf-8");
      xhr.onload = function() { resolve(xhr.responseText); };
      xhr.onerror = function() { reject(new Error("Network error")); };
      xhr.ontimeout = function() { reject(new Error("Timeout")); };
      xhr.timeout = 30000;
      xhr.send(body);
    });
    
    syncStatus = "ok"; lastSync = new Date();
    _pendingSync = false;
  } catch (e) {
    console.error("Cloud save error:", e);
    syncStatus = "error";
    _pendingSync = true;
  }
  renderSyncBadge();
}

function cloudSave(data, lastAction) {
  if (!SCRIPT_URL) return;
  _pendingSync = true;
  clearTimeout(_syncTimer);
  _syncTimer = setTimeout(() => _doCloudSave(data, lastAction), 2000);
}

async function doPushToCloud() {
  if (!SCRIPT_URL) { alert("Not connected to Google Sheets. Go to Settings → Reconfigure."); return; }
  clearTimeout(_syncTimer);
  await _doCloudSave(D);
  if (syncStatus === "ok") { alert("✅ Data pushed to Google Sheets successfully!"); render(); }
  else alert("❌ Push failed. Check your internet connection and try again.");
}

async function doPullFromCloud() {
  if (!SCRIPT_URL) { alert("Not connected to Google Sheets. Go to Settings → Reconfigure."); return; }
  if (!confirm("Download data from Google Sheets? This will replace your local data.")) return;
  const cd = await cloudLoad();
  if (cd && cd.company) {
    const m2 = mkDefault();
    Object.keys(m2).forEach(k => { if (cd[k] !== undefined) m2[k] = cd[k] });
    D = m2;
    saveLocal();
    _pendingSync = false;
    alert("✅ Data loaded from Google Sheets!");
    render();
  } else {
    alert("❌ No data found in cloud or download failed.");
  }
}

function renderSyncBadge() {
  const badge = syncStatus === "ok" ? `<span class="sync-badge sync-ok">☁️ Synced${lastSync ? " " + lastSync.toLocaleTimeString() : ""}</span>`
    : syncStatus === "syncing" ? `<span class="sync-badge sync-ing">⏳ Syncing...</span>`
    : syncStatus === "error" ? `<span class="sync-badge sync-err">⚠️ Sync Error</span>`
    : syncStatus === "none" ? `<span class="sync-badge" style="background:var(--s3);color:var(--mu)">💾 Local Only</span>`
    : `<span class="sync-badge sync-ok">☁️ Connected</span>`;
  const el = document.getElementById("sync-badge");
  if (el) el.innerHTML = badge;
  const el2 = document.getElementById("sync-badge-dash");
  if (el2) el2.innerHTML = badge;
}

// ═══ STATE ═══
let D = mkDefault();
let view = "dashboard", year = new Date().getFullYear(), month = MS[new Date().getMonth()];
let showSetup = false;

function loadLocal() { try { const s = localStorage.getItem(SK); if (s) { const p = JSON.parse(s); const m = mkDefault(); Object.keys(m).forEach(k => { if (p[k] !== undefined) m[k] = p[k] }); D = m } } catch {} }
function saveLocal() { try { localStorage.setItem(SK, JSON.stringify(D)) } catch {} }

let _autoSyncTimer = null;

function upd(fn, lastAction) {
  fn(D);
  saveLocal();
  _pendingSync = true;
  render();
  // Auto-push to cloud every 30 seconds after last change
  if (SCRIPT_URL) {
    clearTimeout(_autoSyncTimer);
    _autoSyncTimer = setTimeout(async () => {
      await _doCloudSave(D);
      render();
    }, 30000);
  }
}

// ═══ HELPERS ═══
function getYd(){return D.years[year]||{income:{},expenses:{},entries:{}}}
function getStats(){const yd=getYd(),r={};const iC=D.incomeCats,eC=D.expenseCats;MS.forEach(m=>{const inc=iC.reduce((s,c)=>s+(yd.income?.[m]?.[c.id]||0),0);const exp=eC.reduce((s,c)=>s+(yd.expenses?.[m]?.[c.id]||0),0);r[m]={income:inc,expenses:exp,net:inc-exp}});return r}
function getYtd(stats){return MS.reduce((a,m)=>({income:a.income+stats[m].income,expenses:a.expenses+stats[m].expenses,net:a.net+stats[m].net}),{income:0,expenses:0,net:0})}
function getQs(stats){return QS.map((q,i)=>{const s=q.reduce((a,m)=>({income:a.income+stats[m].income,expenses:a.expenses+stats[m].expenses,net:a.net+stats[m].net}),{income:0,expenses:0,net:0});return{...s,label:`Q${i+1}`}})}
function minibar(val,max,color){const p=max>0?Math.min((val/max)*100,100):0;return`<div class="minibar"><div class="minibar-fill" style="width:${p}%;background:${color}"></div></div>`}
function spark(values,color,w=140,h=38){if(!values||values.length<2)return"";const mx=Math.max(...values,1),mn=Math.min(...values,0),r=mx-mn||1;const pts=values.map((v,i)=>`${(i/(values.length-1))*w},${h-4-((v-mn)/r)*(h-8)}`);const gid="g"+color.replace(/\W/g,"");return`<svg width="${w}" height="${h}" style="display:block"><defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="${color}" stop-opacity=".2"/><stop offset="100%" stop-color="${color}" stop-opacity=".01"/></linearGradient></defs><path d="M0,${h} L${pts.join(" L")} L${w},${h}Z" fill="url(#${gid})"/><polyline fill="none" stroke="${color}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" points="${pts.join(" ")}"/>${values.map((v,i)=>{const x=(i/(values.length-1))*w,y=h-4-((v-mn)/r)*(h-8);return`<circle cx="${x}" cy="${y}" r="2" fill="${color}"/>`}).join("")}</svg>`}
function ring(p,color,size,label){const r2=size/2-4,c=2*Math.PI*r2,d=c-(Math.min(p,100)/100)*c;return`<div style="text-align:center"><svg width="${size}" height="${size}"><circle cx="${size/2}" cy="${size/2}" r="${r2}" fill="none" stroke="var(--s3)" stroke-width="3.5"/><circle cx="${size/2}" cy="${size/2}" r="${r2}" fill="none" stroke="${color}" stroke-width="3.5" stroke-dasharray="${c}" stroke-dashoffset="${d}" stroke-linecap="round" transform="rotate(-90 ${size/2} ${size/2})" style="transition:stroke-dashoffset .5s"/><text x="${size/2}" y="${size/2+1}" text-anchor="middle" dominant-baseline="middle" fill="var(--tx)" font-size="11" font-weight="700">${Math.min(p,100)}%</text></svg><div style="font-size:9px;color:var(--mu);margin-top:1px">${esc(label)}</div></div>`}

    <input id="setup-url" placeholder="Paste your Apps Script Web App URL here..." value="${esc(SCRIPT_URL)}">

    <div class="ma" style="justify-content:center">
      <button class="b1" onclick="doConnect()" style="padding:10px 28px;font-size:13px">Connect & Sync</button>
      <button class="b2" onclick="doSkipSetup()">Use Offline Only</button>
    </div>
    ${SCRIPT_URL ? `<div style="text-align:center;margin-top:12px"><button class="b2" style="font-size:11px" onclick="doDisconnect()">Disconnect Google Sheets</button></div>` : ""}

async function doConnect() {
  const url = document.getElementById("setup-url").value.trim();
  if (!url || !url.startsWith("https://script.google.com/")) {
    alert("Please paste a valid Google Apps Script Web App URL.");
    return;
  }
  SCRIPT_URL = url;
  localStorage.setItem("kdental_script_url", SCRIPT_URL);
  syncStatus = "syncing";

  // Try to load existing data from the sheet
  const cloudData = await cloudLoad();
  if (cloudData && cloudData.company) {
    // Cloud has data — ask if they want to use it or overwrite
    if (confirm("Found existing data in Google Sheet. Use cloud data? (OK = use cloud, Cancel = overwrite with local)")) {
      const m = mkDefault();
      Object.keys(m).forEach(k => { if (cloudData[k] !== undefined) m[k] = cloudData[k] });
      D = m;
      saveLocal();
    } else {
      await cloudSave(D);
    }
  } else {
    // No data in cloud — push local data up
    await cloudSave(D);
  }

  showSetup = false;
  render();
}

function doSkipSetup() { showSetup = false; render(); }
function doDisconnect() { SCRIPT_URL = ""; localStorage.removeItem("kdental_script_url"); syncStatus = "none"; showSetup = false; render(); }

    h+=`<div style="overflow-x:auto"><table class="stl"><thead><tr><th>Month</th><th style="text-align:right">Inflow</th><th style="text-align:right">Outflow</th><th style="text-align:right">Net Flow</th><th style="text-align:right">Running Balance</th></tr></thead><tbody>`;

    MS.forEach(m=>{const s=stats[m];runningBalance+=s.net;const hasData=s.income>0||s.expenses>0;h+=`<tr${!hasData?" style=\"opacity:.4\"":""}><td>${m}</td><td style="text-align:right;color:var(--ac)">${fmt(s.income)}</td><td style="text-align:right;color:var(--dn)">${fmt(s.expenses)}</td><td style="text-align:right;color:${s.net>=0?"var(--ac)":"var(--dn)"}; font-weight:600">${s.net?fmtS(s.net):"—"}</td><td style="text-align:right;font-weight:600;color:${runningBalance>=0?"var(--ac)":"var(--dn)"}">${fmtS(runningBalance)}</td></tr>`});
    h+=`<tr class="tr"><td>Total</td><td style="text-align:right;color:var(--ac);font-weight:700">${fmt(ytd2.income)}</td><td style="text-align:right;color:var(--dn);font-weight:700">${fmt(ytd2.expenses)}</td><td style="text-align:right;font-weight:700;color:${ytd2.net>=0?"var(--ac)":"var(--dn)"}">${fmtS(ytd2.net)}</td><td style="text-align:right;font-weight:700;color:${runningBalance>=0?"var(--ac)":"var(--dn)"}">${fmtS(runningBalance)}</td></tr>`;
    h+=`</tbody></table></div>`;
    // Cash flow sparkline
    let rb2=cf.startingCash||0;const cfVals=MS.map(m=>{rb2+=stats[m].net;return rb2});
    h+=`<div style="margin-top:12px"><div class="cl">Running Balance Trend</div>${spark(cfVals,rb2>=0?pal.accent:pal.danger,300,50)}</div></div>`;

    // ═══ BREAK-EVEN ANALYSIS ═══
    const fixedCosts=co.fixedCosts||0;
    const variableCosts=fixedCosts>0?ytd2.expenses-fixedCosts*mCount:0;
    const variableRatio=ytd2.income>0&&fixedCosts>0?(variableCosts/ytd2.income):0;
    const breakEvenRevenue=fixedCosts>0&&variableRatio<1?fixedCosts/(1-variableRatio):0;
    const breakEvenDays=avgIncome>0?Math.ceil((avgExpenses/avgIncome)*(co.workingDaysPerMonth||22)):0;
    const daysToBreakEven=avgIncome>0?Math.ceil(avgExpenses/(avgIncome/(co.workingDaysPerMonth||22))):0;
    h+=`<div class="sec"><div class="st">📍 Break-Even Analysis — ${year}</div>`;
    if(fixedCosts>0){
      h+=`<div class="cds" style="margin-bottom:10px">${[
        {l:"Monthly Fixed Costs",v:fmt(fixedCosts),c:"var(--dn)",s:"Rent, salaries, etc."},
        {l:"Break-Even Revenue",v:fmt(breakEvenRevenue),c:"var(--wn)",s:"Monthly revenue needed"},
        {l:"Current vs Break-Even",v:avgIncome>breakEvenRevenue?"✅ Above":"⚠️ Below",c:avgIncome>breakEvenRevenue?"var(--ac)":"var(--dn)",s:avgIncome>breakEvenRevenue?`${fmt(avgIncome-breakEvenRevenue)} cushion`:"Need "+fmt(breakEvenRevenue-avgIncome)+" more"}
      ].map(x=>`<div class="cd"><div class="cl">${x.l}</div><div class="cvl" style="color:${x.c};font-size:18px">${x.v}</div><div class="css2">${x.s}</div></div>`).join("")}</div>`;
    } else {
      h+=`<div style="font-size:12px;color:var(--mu);margin-bottom:10px">To enable full break-even analysis, set your <strong>monthly fixed costs</strong> in Settings → Clinic / Company.</div>`;
    }
    h+=`<div class="cds" style="margin-bottom:0">${[
      {l:"Days to Cover Expenses",v:`${daysToBreakEven} days`,c:daysToBreakEven<=(co.workingDaysPerMonth||22)?"var(--ac)":"var(--dn)",s:`of ${co.workingDaysPerMonth||22} working days`},
      {l:"Avg Daily Revenue",v:fmt(avgIncome/(co.workingDaysPerMonth||22)),c:"var(--ac)",s:"Income ÷ working days"},
      {l:"Avg Daily Expenses",v:fmt(avgExpenses/(co.workingDaysPerMonth||22)),c:"var(--dn)",s:"Expenses ÷ working days"}
    ].map(x=>`<div class="cd"><div class="cl">${x.l}</div><div class="cvl" style="color:${x.c};font-size:18px">${x.v}</div><div class="css2">${x.s}</div></div>`).join("")}</div></div>`;

    // ═══ GROWTH TREND REPORT ═══
    h+=`<div class="sec"><div class="st">📈 Growth Trend Report — ${year}</div>`;
    if(monthsWithData.length>=2){
      h+=`<div style="overflow-x:auto"><table class="stl"><thead><tr><th>Month</th><th style="text-align:right">Income</th><th style="text-align:right">MoM Growth</th><th style="text-align:right">Expenses</th><th style="text-align:right">MoM Change</th><th style="text-align:right">Net</th><th style="text-align:right">Margin</th></tr></thead><tbody>`;
      monthsWithData.forEach((m,i)=>{
        const s=stats[m];const margin=s.income>0?((s.net/s.income)*100).toFixed(0):"0";
        let incGrowth="—",expGrowth="—",incGColor="var(--mu)",expGColor="var(--mu)";
        if(i>0){const prev=stats[monthsWithData[i-1]];if(prev.income>0){const g=((s.income-prev.income)/prev.income*100).toFixed(1);incGrowth=(g>=0?"+":"")+g+"%";incGColor=g>=0?"var(--ac)":"var(--dn)"}if(prev.expenses>0){const g=((s.expenses-prev.expenses)/prev.expenses*100).toFixed(1);expGrowth=(g>=0?"+":"")+g+"%";expGColor=g<=0?"var(--ac)":"var(--dn)"}}
        h+=`<tr><td style="font-weight:600">${m}</td><td style="text-align:right;color:var(--ac)">${fmt(s.income)}</td><td style="text-align:right;color:${incGColor}">${incGrowth}</td><td style="text-align:right;color:var(--dn)">${fmt(s.expenses)}</td><td style="text-align:right;color:${expGColor}">${expGrowth}</td><td style="text-align:right;font-weight:600;color:${s.net>=0?"var(--ac)":"var(--dn)"}">${fmtS(s.net)}</td><td style="text-align:right">${margin}%</td></tr>`;
      });
      h+=`</tbody></table></div>`;
      // Growth sparklines
      h+=`<div class="cds" style="grid-template-columns:1fr 1fr;margin-top:12px"><div class="cd"><div class="cl">Income Growth</div>${spark(monthsWithData.map(m=>stats[m].income),pal.accent,200,40)}</div><div class="cd"><div class="cl">Net Profit Trend</div>${spark(monthsWithData.map(m=>stats[m].net),pal.accent2||pal.accent,200,40)}</div></div>`;
    } else {
      h+=`<div class="empty-msg">Need at least 2 months of data to show growth trends.</div>`;
    }
    h+=`</div>`;

    // ═══ REVENUE PER CHAIR / PER DAY ═══
    const chairs=co.chairs||3;const wDays=co.workingDaysPerMonth||22;
    const totalWorkDays=wDays*mCount;
    const revPerChairMonth=avgIncome/chairs;
    const revPerChairDay=revPerChairMonth/wDays;
    const revPerDay=avgIncome/wDays;
    const profitPerDay=avgNet/wDays;
    const profitPerChairDay=profitPerDay/chairs;
    h+=`<div class="sec"><div class="st">🪑 Revenue Per Chair / Per Day — ${year}</div>`;
    h+=`<div style="font-size:11px;color:var(--mu);margin-bottom:12px">${chairs} chair${chairs>1?"s":""} · ${wDays} working days/month · Based on ${mCount} month${mCount>1?"s":""} of data</div>`;
    h+=`<div class="cds" style="grid-template-columns:repeat(auto-fit,minmax(150px,1fr));margin-bottom:0">${[
      {l:"Revenue / Day",v:fmt(revPerDay),c:"var(--ac)",s:"Total daily revenue"},
      {l:"Revenue / Chair / Day",v:fmt(revPerChairDay),c:"var(--ac)",s:"Per chair per day"},
      {l:"Revenue / Chair / Month",v:fmt(revPerChairMonth),c:"var(--ac)",s:"Per chair monthly"},
      {l:"Profit / Day",v:fmtS(profitPerDay),c:profitPerDay>=0?"var(--ac)":"var(--dn)",s:"Net profit per day"},
      {l:"Profit / Chair / Day",v:fmtS(profitPerChairDay),c:profitPerChairDay>=0?"var(--ac)":"var(--dn)",s:"Net per chair per day"},
      {l:"Chair Utilization Target",v:fmt(avgExpenses/chairs/wDays),c:"var(--wn)",s:"Min rev/chair/day to break even"}
    ].map(x=>`<div class="cd"><div class="cl">${x.l}</div><div class="cvl" style="color:${x.c};font-size:17px">${x.v}</div><div class="css2">${x.s}</div></div>`).join("")}</div>`;
    // Monthly per-chair table
    h+=`<div style="overflow-x:auto;margin-top:12px"><table class="stl"><thead><tr><th>Month</th><th style="text-align:right">Rev/Day</th><th style="text-align:right">Rev/Chair/Day</th><th style="text-align:right">Profit/Day</th></tr></thead><tbody>`;
    monthsWithData.forEach(m=>{const s=stats[m];const rd=s.income/wDays;const rcd=rd/chairs;const pd=s.net/wDays;h+=`<tr><td>${m}</td><td style="text-align:right;color:var(--ac)">${fmt(rd)}</td><td style="text-align:right">${fmt(rcd)}</td><td style="text-align:right;color:${pd>=0?"var(--ac)":"var(--dn)"}">${fmtS(pd)}</td></tr>`});
    h+=`</tbody></table></div>`;
    h+=`<div style="font-size:10px;color:var(--mu);margin-top:8px">💡 You can change chairs and working days in Settings → Clinic / Company</div></div>`;
  }

  // ═══ SETTINGS ═══
  if(view==="settings"){
    h+=`<div class="sec"><div class="st">☁️ Google Sheets Sync</div><div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><span id="sync-badge2"></span><button class="re" style="font-size:11px;padding:5px 12px" onclick="showSetup=true;render()">⚙️ ${SCRIPT_URL?"Reconfigure":"Connect Google Sheets"}</button>${SCRIPT_URL?`<button class="b1" style="font-size:11px;padding:6px 14px" onclick="doPushToCloud()">⬆️ Push to Cloud</button><button class="b2" style="font-size:11px;padding:6px 14px" onclick="doPullFromCloud()">⬇️ Sync from Cloud</button>`:""}</div>${_pendingSync?`<div style="font-size:11px;color:var(--wn);margin-top:8px">⚠️ You have unsaved changes. Click "Push to Cloud" to sync.</div>`:""}</div>`;
    h+=`<div class="sec"><div class="st">🏢 Clinic / Company</div><label style="font-size:11px;color:var(--mu);margin-bottom:3px;display:block">Name</label><input style="width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);font-size:13px;font-family:inherit;margin-bottom:8px" value="${esc(co.name||"")}" onchange="upd(d=>{d.company.name=this.value})" oninput="D.company.name=this.value;saveLocal()"><label style="font-size:11px;color:var(--mu);margin-bottom:3px;display:block;margin-top:8px">Subtitle</label><input style="width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);font-size:13px;font-family:inherit;margin-bottom:8px" value="${esc(co.subtitle||"")}" onchange="upd(d=>{d.company.subtitle=this.value})" oninput="D.company.subtitle=this.value;saveLocal()"><label style="font-size:11px;color:var(--mu);margin-bottom:3px;display:block;margin-top:8px">Logo</label><div style="display:flex;align-items:center;gap:10px">${co.logoDataUrl?`<div style="width:48px;height:48px;border-radius:10px;overflow:hidden;border:1px solid var(--bd)"><img src="${co.logoDataUrl}" style="width:100%;height:100%;object-fit:cover"></div>`:""}<button class="b2" onclick="document.getElementById('logo-input').click()">Upload</button>${co.logoDataUrl?`<button class="b3" style="padding:6px 12px" onclick="upd(d=>{d.company.logoDataUrl=null})">Remove</button>`:""}</div></div>`;
    h+=`<div class="sec"><div class="st">🪑 Operational Settings</div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px"><div><label style="font-size:11px;color:var(--mu);margin-bottom:3px;display:block">Dental Chairs</label><input type="number" style="width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);font-size:13px;font-family:inherit" value="${co.chairs||3}" onchange="upd(d=>{d.company.chairs=+this.value||3})"></div><div><label style="font-size:11px;color:var(--mu);margin-bottom:3px;display:block">Working Days/Month</label><input type="number" style="width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);font-size:13px;font-family:inherit" value="${co.workingDaysPerMonth||22}" onchange="upd(d=>{d.company.workingDaysPerMonth=+this.value||22})"></div><div><label style="font-size:11px;color:var(--mu);margin-bottom:3px;display:block">Monthly Fixed Costs (₱)</label><input type="number" style="width:100%;padding:8px 10px;border:1px solid var(--bd);border-radius:7px;background:var(--bg);color:var(--tx);font-size:13px;font-family:inherit" value="${co.fixedCosts||0}" onchange="upd(d=>{d.company.fixedCosts=+this.value||0})"></div></div><div style="font-size:10px;color:var(--mu);margin-top:8px">Used for Break-Even Analysis and Revenue Per Chair reports. Fixed costs = rent, salaries, insurance, etc.</div></div>`;
    h+=`<div class="sec"><div class="st">🎨 Color Palette</div><div class="pg">${PRESETS.map(p=>{const act=p.c.accent===pal.accent&&p.c.bg===pal.bg;return`<div class="po ${act?"act":""}" style="background:${p.c.surface}" onclick='applyPreset(${JSON.stringify(p.c)})'><div class="pd"><span style="background:${p.c.accent}"></span><span style="background:${p.c.accent2}"></span><span style="background:${p.c.danger}"></span></div><div class="pl" style="color:${p.c.muted}">${p.name}</div></div>`}).join("")}</div><div style="margin-top:10px;font-size:11px;color:var(--mu);font-weight:600;margin-bottom:6px">Custom</div>${[["bg","Background"],["surface","Surface"],["accent","Accent"],["accent2","Accent 2"],["danger","Danger"],["warning","Warning"],["text","Text"],["muted","Muted"],["border","Border"]].map(([k,l])=>`<div class="cr"><label style="font-size:11px;color:var(--mu)">${l}</label><input type="color" value="${pal[k]||"#000"}" onchange="upd(d=>{d.palette.${k}=this.value})"><span style="font-size:10px;color:var(--mu);font-family:monospace">${pal[k]}</span></div>`).join("")}</div>`;
    h+=`<div class="sec"><div class="st">💰 Income Sources<span class="sp"></span><button class="re" onclick="modalAddCat('income')">+ Add</button></div>${iCats.map(c=>`<div class="rw"><span class="ri">${c.icon}</span><span class="rn">${esc(c.name)}</span><button class="re" onclick="modalEditCat('income','${c.id}','${esc(c.icon)}','${esc(c.name)}')">✏️</button><button class="b3" onclick="if(confirm('Delete?'))doDelCat('income','${c.id}')">✕</button></div>`).join("")}</div>`;
    h+=`<div class="sec"><div class="st">📉 Expense Categories<span class="sp"></span><button class="re" onclick="modalAddCat('expense')">+ Add</button></div>${eCats.map(c=>`<div class="rw"><span class="ri">${c.icon}</span><span class="rn">${esc(c.name)}</span><button class="re" onclick="modalEditCat('expense','${c.id}','${esc(c.icon)}','${esc(c.name)}')">✏️</button><button class="b3" onclick="if(confirm('Delete?'))doDelCat('expense','${c.id}')">✕</button></div>`).join("")}</div>`;
    h+=`<div class="sec"><div class="st">🗃️ Data</div><div style="display:flex;gap:8px;flex-wrap:wrap"><button class="b2" onclick="doExport()">Export JSON</button><button class="b3" style="padding:8px 16px;font-size:12px" onclick="if(confirm('Reset ALL data?'))doReset()">Reset All</button></div></div>`;
  }

  document.getElementById("app").innerHTML=h;
  renderSyncBadge();
  // Also update sync badge in settings if visible
  const sb2 = document.getElementById("sync-badge2");
  if(sb2){
    if(SCRIPT_URL) sb2.innerHTML=`<span class="sync-badge sync-ok">☁️ Connected to Google Sheets</span>`;
    else sb2.innerHTML=`<span class="sync-badge" style="background:var(--s3);color:var(--mu)">💾 Local Only — not synced</span>`;
  }
}

// ═══ ACTIONS ═══
function setView(v){view=v;closeModal();render()}
function setYear(y){year=y;ensureYr(D,y);saveLocal();render()}
function setMonth(m){month=m;render()}
function applyPreset(c){upd(d=>{d.palette=JSON.parse(JSON.stringify(c))})}
async function doForceSync(){if(!SCRIPT_URL)return;const choice=prompt("Type PULL to download cloud data, or PUSH to upload local data to cloud:","PUSH");if(!choice)return;if(choice.toUpperCase()==="PULL"){const cd=await cloudLoad();if(cd&&cd.company){const m=mkDefault();Object.keys(m).forEach(k=>{if(cd[k]!==undefined)m[k]=cd[k]});D=m;saveLocal();render();alert("Cloud data loaded!")}else{alert("No data found in cloud or load failed.")}}else if(choice.toUpperCase()==="PUSH"){await doPushToCloud()}else{alert("Please type PULL or PUSH")}}

function modalEditVal(dt,cid,cn,v){openModal(`<h3>Edit ${cn}</h3><label>${MF[MS.indexOf(month)]} ${year} (₱)</label><input id="mv" type="number" value="${v||""}" placeholder="0" autofocus><div class="ma"><button class="b2" onclick="closeModal()">Cancel</button><button class="b1" onclick="doSetVal('${dt}','${cid}')">Save</button></div>`);setTimeout(()=>{const el=document.getElementById("mv");if(el){el.focus();el.select();el.onkeydown=e=>{if(e.key==="Enter")doSetVal(dt,cid)}}},50)}
function doSetVal(dt,cid){const v=+document.getElementById("mv").value||0;upd(d=>{ensureYr(d,year);d.years[year][dt][month][cid]=v});closeModal()}

function modalEditBudget(planType,cid,cn,currentVal,currentPct){
  const isExpense=planType==="expensePlan";
  const pctVal=currentPct||0;
  openModal(`<h3>Budget: ${cn}</h3><label>${MF[MS.indexOf(month)]} ${year} — Fixed Amount (₱)</label><input id="mbv" type="number" value="${currentVal||""}" placeholder="0">${isExpense?`<label>OR Set as % of Gross Income</label><input id="mbp" type="number" value="${pctVal||""}" placeholder="e.g. 10 for 10%" min="0" max="100"><div style="font-size:10px;color:var(--mu);margin-top:4px">If % is set, budget auto-calculates from income each month. Set to 0 to use fixed amount instead.</div>`:""}<div class="ma"><button class="b2" onclick="closeModal()">Cancel</button><button class="b1" onclick="doSaveBudget('${planType}','${cid}')">Save</button></div>`);
  setTimeout(()=>{const el=document.getElementById("mbv");if(el){el.focus();el.select()}},50);
}
function doSaveBudget(planType,cid){
  const v=+document.getElementById("mbv").value||0;
  const pEl=document.getElementById("mbp");
  const p2=pEl?(+pEl.value||0):0;
  upd(d=>{
    ensureYr(d,year);
    if(!d.years[year].budget)d.years[year].budget={incomePlan:{},expensePlan:{}};
    if(!d.years[year].budget[planType])d.years[year].budget[planType]={};
    if(!d.years[year].budget[planType][month])d.years[year].budget[planType][month]={};
    d.years[year].budget[planType][month][cid]=v;
    if(p2>0){if(!d.budgetPct)d.budgetPct={};d.budgetPct[cid]=p2}
    else if(d.budgetPct&&d.budgetPct[cid])delete d.budgetPct[cid];
  });
  closeModal();
}
function modalEditCat(ct,id,icon,name){openModal(`<h3>Edit Category</h3><label>Icon</label><input id="mci" value="${icon}" maxlength="4"><label>Name</label><input id="mcn" value="${name}"><div class="ma"><button class="b2" onclick="closeModal()">Cancel</button><button class="b1" onclick="doEditCat('${ct}','${id}')">Save</button></div>`)}
function doEditCat(ct,id){const ic=document.getElementById("mci").value,nm=document.getElementById("mcn").value;upd(d=>{const c=d[ct+"Cats"].find(x=>x.id===id);if(c){c.icon=ic;c.name=nm}});closeModal()}
function modalAddCat(ct){const label=ct==="income"?"Income Source":"Expense Category";openModal(`<h3>Add ${label}</h3><label>Icon</label><input id="mci" value="${ct==="income"?"💰":"📄"}" maxlength="4"><label>Name</label><input id="mcn" placeholder="e.g. ${ct==="income"?"Associate Dr. X":"Lab Equipment"}"><div class="ma"><button class="b2" onclick="closeModal()">Cancel</button><button class="b1" onclick="doAddCat('${ct}')">Add</button></div>`)}
function doAddCat(ct){const n=document.getElementById("mcn").value,ic=document.getElementById("mci").value;if(!n)return;upd(d=>{d[ct+"Cats"].push({id:uid(),name:n,icon:ic||"📄"})});closeModal()}
function doDelCat(ct,id){upd(d=>{d[ct+"Cats"]=d[ct+"Cats"].filter(x=>x.id!==id)})}

function modalAddEntry(){const iCats=D.incomeCats,eCats=D.expenseCats;openModal(`<h3>Add Entry — ${MF[MS.indexOf(month)]} ${year}</h3><label>Type</label><select id="met" onchange="updateEntryCats()"><option value="expenses">Expense</option><option value="income">Income</option></select><label>Category</label><select id="mec">${eCats.map(c=>`<option value="${c.id}">${c.icon} ${esc(c.name)}</option>`).join("")}</select><label>Description</label><input id="med" placeholder="e.g. Globe KDENTAL"><label>Amount (₱)</label><input id="mea" type="number" placeholder="0" autofocus><div class="ma"><button class="b2" onclick="closeModal()">Cancel</button><button class="b1" onclick="doAddEntry()">Add</button></div>`);setTimeout(()=>{const el=document.getElementById("mea");if(el)el.focus()},50)}
function updateEntryCats(){const t=document.getElementById("met").value;const cats=t==="income"?D.incomeCats:D.expenseCats;document.getElementById("mec").innerHTML=cats.map(c=>`<option value="${c.id}">${c.icon} ${esc(c.name)}</option>`).join("")}
function doAddEntry(){const t=document.getElementById("met").value,cat=document.getElementById("mec").value,desc=document.getElementById("med").value,amt=+document.getElementById("mea").value;if(!amt||amt<=0)return;const catObj=[...D.incomeCats,...D.expenseCats].find(c=>c.id===cat);upd(d=>{ensureYr(d,year);d.years[year].entries[month].push({type:t,category:cat,description:desc,amount:amt,id:uid(),ts:Date.now()});d.years[year][t][month][cat]=(d.years[year][t][month][cat]||0)+amt},{type:t,category:catObj?.name||cat,description:desc,amount:amt,period:`${month} ${year}`});closeModal()}
function doDelEntry(m,eid){upd(d=>{ensureYr(d,year);const i=d.years[year].entries[m].findIndex(e=>e.id===eid);if(i>=0){const e=d.years[year].entries[m][i];d.years[year][e.type][m][e.category]=Math.max(0,(d.years[year][e.type][m][e.category]||0)-e.amount);d.years[year].entries[m].splice(i,1)}})}

function modalAddRec(){const cats=[...D.incomeCats,...D.expenseCats];openModal(`<h3>Add Recurring</h3><label>Name</label><input id="mrn" placeholder="e.g. Converge WiFi"><label>Type</label><select id="mrt"><option value="expenses">Expense</option><option value="income">Income</option></select><label>Category</label><select id="mrc">${cats.map(c=>`<option value="${c.id}">${c.icon} ${esc(c.name)}</option>`).join("")}</select><label>Monthly Amount (₱)</label><input id="mra" type="number" placeholder="0"><label>Start</label><div class="flex-row"><select id="mrsm">${MS.map((m,i)=>`<option value="${i}">${m}</option>`).join("")}</select><input id="mrsy" type="number" value="${year}" style="width:80px"></div><label>End (blank = ongoing)</label><div class="flex-row"><select id="mrem">${MS.map((m,i)=>`<option value="${i}"${i===11?" selected":""}>${m}</option>`).join("")}</select><input id="mrey" type="number" placeholder="Ongoing" style="width:80px"></div><div class="ma"><button class="b2" onclick="closeModal()">Cancel</button><button class="b1" onclick="doAddRec()">Add</button></div>`)}
function doAddRec(){const n=document.getElementById("mrn").value,a=+document.getElementById("mra").value;if(!n||!a)return;upd(d=>{d.recurring.push({id:uid(),name:n,type:document.getElementById("mrt").value,category:document.getElementById("mrc").value,amount:a,startMonth:+document.getElementById("mrsm").value,startYear:+document.getElementById("mrsy").value||year,endMonth:+document.getElementById("mrem").value,endYear:+document.getElementById("mrey").value||9999,active:true})});closeModal()}
function doDelRec(id){upd(d=>{d.recurring=d.recurring.filter(x=>x.id!==id)})}
function doTogRec(id){upd(d=>{const r=d.recurring.find(x=>x.id===id);if(r)r.active=!r.active})}
function doApplyRec(id){const rec=D.recurring.find(r=>r.id===id);if(!rec)return;upd(d=>{ensureYr(d,year);MS.forEach((m,mi)=>{const sy=rec.startYear||year,ey=rec.endYear||9999,sm=rec.startMonth||0,em=rec.endMonth||11;if(year<sy||year>ey)return;if(year===sy&&mi<sm)return;if(year===ey&&mi>em)return;if(d.years[year].entries[m].some(e=>e.recurringId===rec.id&&e.recurringMonth===mi))return;d.years[year].entries[m].push({type:rec.type,category:rec.category,description:rec.name+" (recurring)",amount:rec.amount,recurringId:rec.id,recurringMonth:mi,id:uid(),ts:Date.now()});d.years[year][rec.type][m][rec.category]=(d.years[year][rec.type][m][rec.category]||0)+rec.amount})})}

function modalEditGoal(f,l,v){const u=f==="emergencyFundPct"?"Percentage (%)":"Amount (₱)";openModal(`<h3>${l}</h3><label>${u}</label><input id="mgv" type="number" value="${v||""}" placeholder="0" autofocus><div class="ma"><button class="b2" onclick="closeModal()">Cancel</button><button class="b1" onclick="doEditGoal('${f}')">Save</button></div>`);setTimeout(()=>{const el=document.getElementById("mgv");if(el){el.focus();el.select();el.onkeydown=e=>{if(e.key==="Enter")doEditGoal(f)}}},50)}
function doEditGoal(f){upd(d=>{d.goals[f]=+document.getElementById("mgv").value||0});closeModal()}

function modalEditBudget(planType,cid,cn,v,pctVal){
  const isExpense=planType==="expensePlan";
  const pctField=isExpense?`<label>Or set as % of Gross Income</label><input id="mbp" type="number" value="${pctVal||""}" placeholder="e.g. 10 for 10%" step="0.5"><div style="font-size:10px;color:var(--mu);margin-top:4px">If % is set, it overrides the fixed amount and auto-calculates from actual income each month.</div>`:""
  openModal(`<h3>Budget: ${cn}</h3><label>${MF[MS.indexOf(month)]} ${year} — Fixed Amount (₱)</label><input id="mbv" type="number" value="${v||""}" placeholder="0" autofocus>${pctField}<div style="margin-top:8px;font-size:10px;color:var(--mu)"><button class="re" style="font-size:10px" onclick="doCopyBudgetToAll('${planType}','${cid}')">📋 Copy to all months in ${year}</button></div><div class="ma"><button class="b2" onclick="closeModal()">Cancel</button><button class="b1" onclick="doSaveBudget('${planType}','${cid}',${isExpense})">Save</button></div>`);
  setTimeout(()=>{const el=document.getElementById("mbv");if(el){el.focus();el.select();el.onkeydown=e=>{if(e.key==="Enter")doSaveBudget(planType,cid,isExpense)}}},50)
}
function doSaveBudget(planType,cid,isExpense){
  const v=+document.getElementById("mbv").value||0;
  const p=isExpense?(+document.getElementById("mbp")?.value||0):0;
  upd(d=>{
    ensureYr(d,year);
    if(!d.years[year].budget)d.years[year].budget={incomePlan:{},expensePlan:{}};
    if(!d.years[year].budget[planType])d.years[year].budget[planType]={};
    if(!d.years[year].budget[planType][month])d.years[year].budget[planType][month]={};
    d.years[year].budget[planType][month][cid]=v;
    if(isExpense){if(!d.budgetPct)d.budgetPct={};if(p>0)d.budgetPct[cid]=p;else delete d.budgetPct[cid]}
  });closeModal()
}
function doCopyBudgetToAll(planType,cid){
  const v=+document.getElementById("mbv").value||0;
  if(!v&&!confirm("Copy ₱0 to all months?"))return;
  upd(d=>{
    ensureYr(d,year);
    if(!d.years[year].budget)d.years[year].budget={incomePlan:{},expensePlan:{}};
    if(!d.years[year].budget[planType])d.years[year].budget[planType]={};
    MS.forEach(m=>{if(!d.years[year].budget[planType][m])d.years[year].budget[planType][m]={};d.years[year].budget[planType][m][cid]=v})
  });closeModal()
}

function doExport(){const j=JSON.stringify(D,null,2);const b=new Blob([j],{type:"application/json"});const u=URL.createObjectURL(b);const a=document.createElement("a");a.href=u;a.download=`kdental-backup-${year}.json`;a.click();URL.revokeObjectURL(u)}
function doReset(){D=mkDefault();ensureYr(D,year);saveLocal();cloudSave(D);render()}

function modalEditCashFlow(){
  const cf=D.cashFlow||{startingCash:0,banks:[]};
  const banks=cf.banks||[];
  let bankRows=banks.map((b,i)=>`<div style="display:flex;gap:6px;align-items:center;margin:4px 0" id="bank-row-${i}"><input class="cf-bname" value="${esc(b.name)}" placeholder="Bank name" style="flex:2"><select class="cf-btype" style="flex:1"><option value="Savings"${b.type==="Savings"?" selected":""}>Savings</option><option value="Checking"${b.type==="Checking"?" selected":""}>Checking</option><option value="Time Deposit"${b.type==="Time Deposit"?" selected":""}>Time Deposit</option><option value="Cash on Hand"${b.type==="Cash on Hand"?" selected":""}>Cash on Hand</option><option value="Petty Cash"${b.type==="Petty Cash"?" selected":""}>Petty Cash</option><option value="Other"${b.type==="Other"?" selected":""}>Other</option></select><input class="cf-bamt" type="number" value="${b.amount||""}" placeholder="Amount" style="flex:1"><button class="b3" onclick="this.closest('[id^=bank-row]').remove()">✕</button></div>`).join("");
  openModal(`<h3>💰 Cash Flow Setup</h3>
    <label>Starting Cash Balance (₱) — Beginning of ${year}</label>
    <input id="cf-start" type="number" value="${cf.startingCash||""}" placeholder="0">
    <div style="font-size:10px;color:var(--mu);margin-top:4px">Total cash available at the start of ${year} across all accounts.</div>
    <label style="margin-top:14px">Bank Accounts / Cash Locations</label>
    <div id="cf-banks">${bankRows}</div>
    <button class="re" style="margin-top:8px;font-size:11px;padding:5px 12px" onclick="addBankRow()">+ Add Bank Account</button>
    <div class="ma"><button class="b2" onclick="closeModal()">Cancel</button><button class="b1" onclick="doSaveCashFlow()">Save</button></div>`)
}
function addBankRow(){
  const div=document.getElementById("cf-banks");
  const i=div.children.length;
  const row=document.createElement("div");
  row.style.cssText="display:flex;gap:6px;align-items:center;margin:4px 0";
  row.id="bank-row-"+i;
  row.innerHTML='<input class="cf-bname" placeholder="e.g. BDO, BPI, Maxi One..." style="flex:2"><select class="cf-btype" style="flex:1"><option value="Savings">Savings</option><option value="Checking">Checking</option><option value="Time Deposit">Time Deposit</option><option value="Cash on Hand">Cash on Hand</option><option value="Petty Cash">Petty Cash</option><option value="Other">Other</option></select><input class="cf-bamt" type="number" placeholder="Amount" style="flex:1"><button class="b3" onclick="this.parentElement.remove()">✕</button>';
  div.appendChild(row);
}
function doSaveCashFlow(){
  const startingCash=+document.getElementById("cf-start").value||0;
  const bankEls=document.getElementById("cf-banks").children;
  const banks=[];
  for(let i=0;i<bankEls.length;i++){
    const name=bankEls[i].querySelector(".cf-bname")?.value;
    const type=bankEls[i].querySelector(".cf-btype")?.value||"Savings";
    const amount=+(bankEls[i].querySelector(".cf-bamt")?.value)||0;
    if(name)banks.push({name,type,amount});
  }
  upd(d=>{
    if(!d.cashFlow)d.cashFlow={};
    d.cashFlow.startingCash=startingCash;
    d.cashFlow.banks=banks;
  });
  closeModal();
}
